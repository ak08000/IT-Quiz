<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT QUIZ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0a0a0f; --card: rgba(23, 23, 33, 0.9); --text: #ffffff; --acc: #3b82f6; 
            --border: rgba(255, 255, 255, 0.1); --danger: #ef4444; --success: #22c55e; --joker: #a855f7;
        }
        body.light-mode { --bg: #f8fafc; --card: rgba(255, 255, 255, 0.95); --text: #0f172a; --acc: #2563eb; --border: rgba(0, 0, 0, 0.1); }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }

        #scr-intro {
            position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg);
            z-index: 500; display: none; flex-direction: column; justify-content: center; align-items: center; border-radius: 32px;
        }
        .loader-bar { width: 150px; height: 2px; background: rgba(255,255,255,0.1); position: relative; margin-top: 20px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: var(--acc); position: absolute; animation: loadIn 1.5s ease-in-out forwards; }
        @keyframes loadIn { to { width: 100%; } }

        #quiz-app { 
            background: var(--card); width: 440px; border-radius: 32px; padding: 40px; 
            border: 1px solid var(--border); position: relative; backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); z-index: 10;
        }

        .btn { 
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 18px; border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05); color: var(--text); cursor: pointer; font-weight: 600; font-size: 15px;
        }
        .btn:hover:not(:disabled) { background: var(--acc); color: white; transform: translateY(-2px); }
        .btn-secondary { background: transparent; opacity: 0.7; }
        
        input { width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); border-radius: 16px; color: #fff; text-align: center; font-size: 16px; outline: none; margin-bottom: 15px; }
        body.light-mode input { color: #000; }

        .stats-wrap { width: 100%; max-height: 280px; overflow-y: auto; margin: 15px 0; }
        .stats-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .stats-table th { font-size: 10px; opacity: 0.5; text-transform: uppercase; padding-bottom: 5px; }
        .stats-table td { background: rgba(255, 255, 255, 0.03); padding: 12px; text-align: center; font-size: 13px; border-radius: 10px; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card); border-radius: 32px; z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; backdrop-filter: blur(30px);
        }
        .overlay.active { display: flex; }

        .hidden { display: none !important; }
        #settings-trigger { position:absolute; top:30px; right:30px; background:none; border:none; color:var(--text); font-size:22px; cursor:pointer; z-index:110; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="quiz-app">
        <div id="scr-intro">
            <h2 id="l-loading">INITIALIZING</h2>
            <div class="loader-bar"><div class="loader-progress"></div></div>
        </div>

        <button id="settings-trigger" onclick="openOverlay('overlay-settings')">⚙️</button>

        <div id="overlay-settings" class="overlay">
            <h2 id="l-set-title">Settings</h2>
            <button class="btn" id="l-theme" onclick="document.body.classList.toggle('light-mode')">🌓 Theme</button>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; width:100%;">
                <button class="btn btn-secondary" onclick="setLang('de')">DE</button>
                <button class="btn btn-secondary" onclick="setLang('en')">EN</button>
                <button class="btn btn-secondary" onclick="setLang('ja')">JP</button>
                <button class="btn btn-secondary" onclick="setLang('la')">LA</button>
            </div>
            <button class="btn" id="l-close" style="margin-top:20px; background: var(--text); color: var(--bg);" onclick="closeOverlays()">Close</button>
        </div>

        <div id="overlay-stats" class="overlay">
            <h2 id="l-stats-title">Leaderboard</h2>
            <div class="stats-wrap">
                <table class="stats-table">
                    <thead id="l-table-head"></thead>
                    <tbody id="stats-body"></tbody>
                </table>
            </div>
            <button class="btn btn-secondary" id="l-back" onclick="closeOverlays()">Back</button>
        </div>

        <div id="scr-start">
            <h1 id="l-title">IT QUIZ</h1>
            <p style="text-align:center; font-size:11px; margin: 10px 0 25px 0; opacity: 0.5; font-weight: 600;">
                <span id="l-total-label">TOTAL POINTS</span>: <span id="val-total" style="color:var(--acc)">0</span>
            </p>
            
            <div style="display:flex; flex-direction:column; align-items:center; margin-bottom: 25px;">
                <div style="display:flex; align-items:center; gap:20px;">
                    <button class="btn" style="width:45px; border-radius: 50%;" onclick="moveAv(-1)">←</button>
                    <div id="av-box" style="width:90px; height:90px; background: rgba(255,255,255,0.05); border: 2px solid var(--acc); border-radius: 25px; display:flex; align-items:center; justify-content:center; font-size:45px;">🤖</div>
                    <button class="btn" style="width:45px; border-radius: 50%;" onclick="moveAv(1)">→</button>
                </div>
                <div id="av-lock-info" class="hidden" style="background:var(--danger); font-size:9px; padding:4px 10px; border-radius:20px; font-weight:800; margin-top:-10px; color: white;">LOCKED</div>
            </div>

            <input type="text" id="p-name" placeholder="Enter Name..." maxlength="12">
            
            <button class="btn" onclick="startWithIntro('easy')" style="border-left: 6px solid var(--success);" id="l-easy">Easy</button>
            <button class="btn" onclick="startWithIntro('mid')" style="border-left: 6px solid #f1c40f;" id="l-mid">Professional</button>
            <button class="btn" onclick="startWithIntro('hard')" style="border-left: 6px solid var(--danger);" id="l-hard">Chaos</button>
            <button class="btn btn-secondary" onclick="openOverlay('overlay-stats')" id="l-board">📊 Statistics</button>
        </div>

        <div id="scr-game" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 20px;">
                <span id="g-count" style="font-weight: 800; color: var(--acc); font-size: 13px;">1 / 10</span>
                <span id="g-hp">❤️❤️❤️</span>
            </div>
            <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden;">
                <div id="timer-bar" style="height:100%; width:100%; background:var(--acc);"></div>
            </div>
            <h3 id="g-text" style="text-align:center; min-height:80px; font-size:18px; margin: 30px 0;">...</h3>
            <div id="g-answers"></div>
            <button id="g-joker" class="btn" onclick="useJoker()" style="margin-top:20px; color:var(--joker); border-color:var(--joker); font-size: 13px;">🔮 Joker</button>
        </div>

        <div id="scr-end" class="hidden">
            <h2 id="l-end-title" style="text-align:center;">Result</h2>
            <div id="f-score" style="text-align:center; font-size:50px; font-weight:900; color:var(--acc); margin:20px 0;">0 PKT</div>
            <p id="f-perf" style="text-align:center; font-size:13px; opacity: 0.7; margin-bottom: 30px;">...</p>
            <button class="btn" style="background:var(--acc); color:white;" onclick="location.reload()" id="l-main">Menu</button>
        </div>
    </div>

<script>
    const AVATARS = [{e:"🤖", p:0}, {e:"🐱", p:0}, {e:"🥷", p:50}, {e:"👽", p:150}, {e:"👾", p:300}, {e:"💎", p:1000}];
    
    const LANGS = {
        de: { 
            loading: "INITIALISIERE...", title: "IT QUIZ", total: "GESAMTPUNKTE", easy: "Einfach (+1)", mid: "Profi (+3)", hard: "Chaos (+10)", 
            board: "Statistik", set: "Einstellungen", theme: "🌓 Design wechseln", close: "Schließen", back: "Zurück", stats: "Rangliste", 
            ph: "Name...", end: "Ergebnis", main: "Hauptmenü", joker: "🔮 50:50 Joker", locked: "BRAUCHT {n} PKT",
            table: "<tr><th>Av</th><th>Name</th><th>Modus</th><th>Pkt</th></tr>", perf: "Besser als {n}% aller Spieler!" 
        },
        en: { 
            loading: "INITIALIZING...", title: "IT QUIZ", total: "TOTAL POINTS", easy: "Easy (+1)", mid: "Professional (+3)", hard: "Chaos (+10)", 
            board: "Statistics", set: "Settings", theme: "🌓 Switch Theme", close: "Close", back: "Back", stats: "Leaderboard", 
            ph: "Enter Name...", end: "Result", main: "Menu", joker: "🔮 50:50 Joker", locked: "NEED {n} PTS",
            table: "<tr><th>Av</th><th>Name</th><th>Mode</th><th>Pts</th></tr>", perf: "Better than {n}% of players!" 
        },
        ja: { 
            loading: "読み込み中...", title: "ITクイズ", total: "合計ポイント", easy: "簡単 (+1)", mid: "プロ (+3)", hard: "カオス (+10)", 
            board: "ランキング", set: "設定", theme: "🌓 テーマ切替", close: "閉じる", back: "戻る", stats: "ランキング", 
            ph: "名前...", end: "結果", main: "メニュー", joker: "🔮 50:50 ジョーカー", locked: "{n} 点が必要",
            table: "<tr><th>Av</th><th>名前</th><th>モード</th><th>点</th></tr>", perf: "プレイヤーの{n}%より優れています！" 
        },
        la: { 
            loading: "ONERAT...", title: "IT QUIZ", total: "SUMMA PUNCTA", easy: "Facilis (+1)", mid: "Medium (+3)", hard: "Chaos (+10)", 
            board: "Tabula", set: "Configuratio", theme: "🌓 Mutare", close: "Claudere", back: "Retro", stats: "Tabula", 
            ph: "Nomen...", end: "Finis", main: "Menu", joker: "🔮 50:50 Iocus", locked: "OPUS {n} PTS",
            table: "<tr><th>Av</th><th>Nomen</th><th>Mod</th><th>Pts</th></tr>", perf: "Melior quam {n}% lusorum!" 
        }
    };

    const QUESTIONS = {
        easy: [{q:"Wofür steht RAM?", a:["Random Access Memory","Read Access","Rapid Audio"], c:0},{q:"CPU ist...", a:["Zentralrechner","Gehäuse","Lüfter"], c:0}],
        mid: [{q:"Port HTTPS?", a:["443","80","21"], c:0},{q:"DNS Zweck?", a:["Namensauflösung","Virenscan","Speicher"], c:0}],
        hard: [{q:"RAID 0?", a:["Striping","Mirroring","Parity"], c:0},{q:"IPv6 Bit?", a:["128","32","64"], c:0}]
    };

    let curLang='de', score=0, qIdx=0, lives=3, mode='', timer, limit=10, totalPts=0, avIdx=0, swapT;

    totalPts = parseInt(localStorage.getItem('itq_total_pts') || "0");
    document.getElementById('val-total').innerText = totalPts;
    setLang('de');
    renderStats();

    function setLang(l) {
        curLang = l; const s = LANGS[l];
        document.getElementById('l-loading').innerText = s.loading;
        document.getElementById('l-title').innerText = s.title;
        document.getElementById('l-total-label').innerText = s.total;
        document.getElementById('l-easy').innerText = s.easy;
        document.getElementById('l-mid').innerText = s.mid;
        document.getElementById('l-hard').innerText = s.hard;
        document.getElementById('l-board').innerText = s.board;
        document.getElementById('l-set-title').innerText = s.set;
        document.getElementById('l-theme').innerText = s.theme;
        document.getElementById('l-close').innerText = s.close;
        document.getElementById('l-back').innerText = s.back;
        document.getElementById('l-stats-title').innerText = s.stats;
        document.getElementById('p-name').placeholder = s.ph;
        document.getElementById('l-end-title').innerText = s.end;
        document.getElementById('l-main').innerText = s.main;
        document.getElementById('g-joker').innerText = s.joker;
        document.getElementById('l-table-head').innerHTML = s.table;
        
        // Update Avatar Lock Info
        updateAvUI();
        closeOverlays();
    }

    function openOverlay(id) { document.getElementById(id).classList.add('active'); }
    function closeOverlays() { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active')); }
    
    function updateAvUI() {
        document.getElementById('av-box').innerText = AVATARS[avIdx].e;
        const lock = document.getElementById('av-lock-info');
        if(totalPts < AVATARS[avIdx].p) { 
            lock.classList.remove('hidden'); 
            lock.innerText = LANGS[curLang].locked.replace('{n}', AVATARS[avIdx].p); 
        } else { lock.classList.add('hidden'); }
    }

    function moveAv(dir) {
        avIdx = (avIdx + dir + AVATARS.length) % AVATARS.length;
        updateAvUI();
    }

    function startWithIntro(m) {
        if(totalPts < AVATARS[avIdx].p) return;
        mode = m;
        const intro = document.getElementById('scr-intro');
        intro.style.display = 'flex';
        setTimeout(() => {
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                intro.style.opacity = '1';
                startGame();
            }, 500);
        }, 1600);
    }

    function startGame() {
        qIdx = 0; score = 0; lives = 3;
        limit = (mode === 'easy') ? 12 : (mode === 'mid') ? 8 : 4;
        document.getElementById('scr-start').classList.add('hidden');
        document.getElementById('scr-game').classList.remove('hidden');
        document.getElementById('settings-trigger').classList.add('hidden');
        loadQ();
    }

    function loadQ() {
        clearInterval(swapT); if(qIdx >= QUESTIONS[mode].length || lives <= 0) return finish();
        const data = QUESTIONS[mode][qIdx];
        document.getElementById('g-count').innerText = `${qIdx+1} / ${QUESTIONS[mode].length}`;
        document.getElementById('g-text').innerText = data.q;
        const grid = document.getElementById('g-answers'); grid.innerHTML = "";
        let choices = data.a.map((t, i) => ({ t, c: i === data.c }));
        choices.sort(() => Math.random() - 0.5);
        choices.forEach(ch => {
            const b = document.createElement('button'); b.className="btn"; b.innerText=ch.t;
            b.onclick = () => {
                if(ch.c) { score += (mode==='easy'?1 : mode==='mid'?3 : 10); } 
                else { lives--; }
                qIdx++; loadQ();
            };
            grid.appendChild(b);
        });
        if(mode === 'hard') swapT = setInterval(() => { for (let i = grid.children.length; i >= 0; i--) grid.appendChild(grid.children[Math.random()*i|0]); }, 1000);
        resetTimer();
    }

    function resetTimer() {
        clearInterval(timer); const bar = document.getElementById('timer-bar');
        bar.style.transition = "none"; bar.style.width = "100%";
        setTimeout(() => { bar.style.transition = `width ${limit}s linear`; bar.style.width = "0%"; }, 50);
        let startT = Date.now();
        timer = setInterval(() => { 
            if((Date.now()-startT)/1000 >= limit) { lives--; qIdx++; loadQ(); } 
            document.getElementById('g-hp').innerText = "❤️".repeat(Math.max(0, lives)) || "💀"; 
        }, 100);
    }

    function useJoker() {
        const correct = QUESTIONS[mode][qIdx].a[0];
        document.querySelectorAll('#g-answers .btn').forEach(b => { if(b.innerText !== correct) { b.style.opacity = "0.2"; b.disabled = true; } });
        document.getElementById('g-joker').disabled = true;
    }

    function finish() {
        clearInterval(timer); clearInterval(swapT); totalPts += score; localStorage.setItem('itq_total_pts', totalPts);
        let history = JSON.parse(localStorage.getItem('itq_history') || "[]");
        let uNum = parseInt(localStorage.getItem('itq_u_c') || "1");
        let name = document.getElementById('p-name').value.trim();
        if(!name) { name = "User " + uNum; localStorage.setItem('itq_u_c', uNum + 1); }
        
        history.unshift({ a: AVATARS[avIdx].e, n: name, m: mode.toUpperCase(), s: score });
        localStorage.setItem('itq_history', JSON.stringify(history.slice(0, 10)));
        
        let beats = history.filter(h => h.s < score).length;
        let pcent = history.length > 0 ? Math.round((beats / history.length) * 100) : 100;

        document.getElementById('scr-game').classList.add('hidden'); 
        document.getElementById('scr-end').classList.remove('hidden');
        document.getElementById('f-score').innerText = score + " PKT";
        document.getElementById('f-perf').innerText = LANGS[curLang].perf.replace('{n}', pcent);
        if(score > 2) confetti({ particleCount: 150, spread: 70 });
    }

    function renderStats() {
        const body = document.getElementById('stats-body'); body.innerHTML = "";
        const history = JSON.parse(localStorage.getItem('itq_history') || "[]");
        history.forEach(x => { body.innerHTML += `<tr><td>${x.a}</td><td>${x.n}</td><td>${x.m}</td><td>${x.s}</td></tr>`; });
    }
</script>
</body>
</html>
